<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Criação de Tabelas no HTML</h1>
    <table> <!-- Coluna -->
      <tr>  <!-- Linha -->
        <th>Coluna 1</th> <!-- Cabeçalho da coluna -->
        <th>Coluna 2</th>
      </tr>
      <tr>
        <td>Dado 1</td> <!-- Dado da coluna 1 -->
        <td>Dado 2</td> <!-- Dado da coluna 2 -->
      </tr>
    </table>

    <hr />

    <h2>Tabelas com cabeçalho</h2>
    <table>
      <thead> <!-- Separa o cabeçalho da tabela -->
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Profissão</th>
        </tr>
      </thead>
      <tbody> <!-- Separa o corpo da tabela --> 
        <tr>
          <td>João</td>
          <td>30</td>
          <td>Engenheiro</td>
        </tr>
        <tr>
          <td>Maria</td>
          <td>25</td>
          <td>Advogada</td>
        </tr>
      </tbody>
    </table>

    <hr />

    <h2>Tabelas com células personalizadas</h2>
    <table>
      <thead>
        <tr>
          <th colspan="2">Informações Pessoais</th> <!-- Ocupa duas colunas -->
          <th>Contato</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Nome:</td>
          <td>João</td>
          <td rowspan="2">Telefone: 123456</td> <!-- Ocupa duas linhas -->
        </tr>
        <tr>
          <td>Idade:</td>
          <td>30</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
